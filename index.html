<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Monitoring Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #333;
            font-weight: 600;
        }
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        .form-control {
            height: 50px;
            border-radius: 10px;
            border: 1px solid #ddd;
            padding-left: 45px;
            margin-bottom: 20px;
        }
        .input-icon {
            position: relative;
        }
        .input-icon i {
            position: absolute;
            left: 15px;
            top: 17px;
            color: #667eea;
            font-size: 18px;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 50px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            width: 100%;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            color: white;
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-chart-line fa-3x" style="color: #667eea; margin-bottom: 20px;"></i>
            <h2>Monitoring Dashboard</h2>
            <p>Silakan login untuk melanjutkan</p>
        </div>
        
        <div class="alert alert-danger" id="errorAlert" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span id="errorMessage"></span>
        </div>

        <div class="alert alert-success" id="successAlert" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span id="successMessage"></span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-icon">
                <i class="fas fa-envelope"></i>
                <input type="email" class="form-control" id="email" placeholder="Email" required>
            </div>
            <div class="input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <span id="loginText">Login</span>
                <span id="loginSpinner" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i> Loading...
                </span>
            </button>
        </form>

        <div class="register-link">
            <p>Belum punya akun? <a href="#" onclick="showRegister()">Daftar disini</a></p>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Register Akun Baru</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm" onsubmit="handleRegister(event)">
                        <div class="mb-3">
                            <label for="regEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="regEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="regPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="regPassword" required minlength="6">
                            <small class="text-muted">Minimal 6 karakter</small>
                        </div>
                        <div class="mb-3">
                            <label for="regRole" class="form-label">Role</label>
                            <select class="form-control" id="regRole">
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
            authDomain: "rohmadafi.firebaseapp.com",
            databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rohmadafi",
            storageBucket: "rohmadafi.firebasestorage.app",
            messagingSenderId: "285538177933",
            appId: "1:285538177933:web:e1f732b60209da0e28a3c4"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is logged in, redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        });

        // Handle login
        window.handleLogin = function(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            
            // Show loading
            loginText.style.display = 'none';
            loginSpinner.style.display = 'inline-block';
            loginBtn.disabled = true;
            
            // Hide alerts
            document.getElementById('errorAlert').style.display = 'none';
            document.getElementById('successAlert').style.display = 'none';
            
            // Sign in with email and password
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // Check user role from database
                    return database.ref('users/' + user.uid).once('value')
                        .then((snapshot) => {
                            const userData = snapshot.val();
                            if (userData) {
                                // Store user data in session
                                sessionStorage.setItem('userRole', userData.role || 'user');
                                sessionStorage.setItem('userEmail', user.email);
                                
                                // Show success message
                                showSuccess('Login berhasil! Mengalihkan...');
                                
                                // Redirect to dashboard
                                setTimeout(() => {
                                    window.location.href = 'dashboard.html';
                                }, 1500);
                            } else {
                                // If no role data, create default
                                return database.ref('users/' + user.uid).set({
                                    email: user.email,
                                    role: 'user',
                                    createdAt: new Date().toISOString()
                                }).then(() => {
                                    sessionStorage.setItem('userRole', 'user');
                                    sessionStorage.setItem('userEmail', user.email);
                                    
                                    showSuccess('Login berhasil! Mengalihkan...');
                                    
                                    setTimeout(() => {
                                        window.location.href = 'dashboard.html';
                                    }, 1500);
                                });
                            }
                        });
                })
                .catch((error) => {
                    // Hide loading
                    loginText.style.display = 'inline-block';
                    loginSpinner.style.display = 'none';
                    loginBtn.disabled = false;
                    
                    // Show error
                    let errorMessage = 'Login gagal. ';
                    switch (error.code) {
                        case 'auth/user-not-found':
                            errorMessage += 'Email tidak terdaftar.';
                            break;
                        case 'auth/wrong-password':
                            errorMessage += 'Password salah.';
                            break;
                        case 'auth/invalid-email':
                            errorMessage += 'Format email tidak valid.';
                            break;
                        case 'auth/user-disabled':
                            errorMessage += 'Akun telah dinonaktifkan.';
                            break;
                        default:
                            errorMessage += error.message;
                    }
                    showError(errorMessage);
                });
        };

        // Show register modal
        window.showRegister = function() {
            const modal = new bootstrap.Modal(document.getElementById('registerModal'));
            modal.show();
        };

        // Handle register
        window.handleRegister = function(event) {
            event.preventDefault();
            
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            
            // Create user with email and password
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // Save user role to database
                    return database.ref('users/' + user.uid).set({
                        email: user.email,
                        role: role,
                        createdAt: new Date().toISOString()
                    });
                })
                .then(() => {
                    // Close modal
                    bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
                    
                    // Show success message
                    showSuccess('Registrasi berhasil! Silakan login.');
                    
                    // Clear form
                    document.getElementById('registerForm').reset();
                })
                .catch((error) => {
                    let errorMessage = 'Registrasi gagal. ';
                    if (error.code === 'auth/email-already-in-use') {
                        errorMessage += 'Email sudah digunakan.';
                    } else {
                        errorMessage += error.message;
                    }
                    showError(errorMessage);
                });
        };

        // Show error message
        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorAlert.style.display = 'block';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                errorAlert.style.display = 'none';
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            const successAlert = document.getElementById('successAlert');
            const successMessage = document.getElementById('successMessage');
            successMessage.textContent = message;
            successAlert.style.display = 'block';
            
            // Auto hide after 3 seconds
            setTimeout(() => {
                successAlert.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
