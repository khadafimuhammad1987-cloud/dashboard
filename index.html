<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Monitoring Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header .icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .login-header .icon-wrapper i {
            font-size: 40px;
            color: white;
        }
        
        .login-header h2 {
            color: #333;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            position: relative;
            margin-bottom: 20px;
        }
        
        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 18px;
            z-index: 1;
        }
        
        .form-control {
            height: 55px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            padding-left: 45px;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 55px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .alert {
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert-danger {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
        }
        
        .alert-success {
            background-color: #efe;
            border: 1px solid #cfc;
            color: #3c3;
        }
        
        .alert-info {
            background-color: #e7f3ff;
            border: 1px solid #b8daff;
            color: #004085;
        }
        
        .spinner-border {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        
        /* Allowed UID Info */
        .uid-info {
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 12px;
            color: #666;
            text-align: center;
            border: 1px dashed #667eea;
        }
        
        .uid-info i {
            color: #667eea;
            margin-right: 5px;
        }
        
        .restricted-badge {
            display: inline-block;
            background: #ffc107;
            color: #333;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .restricted-badge i {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="icon-wrapper">
                    <i class="fas fa-chart-line"></i>
                </div>
                <span class="restricted-badge">
                    <i class="fas fa-lock"></i> Private Access Only
                </span>
                <h2>Selamat Datang</h2>
                <p>Silakan login dengan akun yang terdaftar</p>
            </div>
            
            <div class="alert alert-danger" id="errorAlert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span id="errorMessage"></span>
            </div>

            <div class="alert alert-success" id="successAlert">
                <i class="fas fa-check-circle me-2"></i>
                <span id="successMessage"></span>
            </div>

            <div class="alert alert-info" id="infoAlert" style="display: none;">
                <i class="fas fa-info-circle me-2"></i>
                <span id="infoMessage"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" class="form-control" id="email" placeholder="Alamat Email" value="cekitet23@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="password" placeholder="Password" value="Matahariku23" required>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="loginText">Login</span>
                    <span id="loginSpinner" style="display: none;">
                        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                        Loading...
                    </span>
                </button>
            </form>

            <!-- UID Info (hidden by default) -->
            <div class="uid-info" id="uidInfo" style="display: none;">
                <i class="fas fa-fingerprint"></i>
                <span id="uidDisplay"></span>
            </div>

            <div class="mt-3 text-center">
                <small class="text-muted">
                    <i class="fas fa-shield-alt me-1"></i>
                    Sistem keamanan terenkripsi
                    </small>By MUHAMMAD FAISAL KHADAFI</small>
                    </small>VERSION 1.0</small>
                </small>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBbP7pZ6YlzAUNOSAfxtt0wRS8GIebZHq0",
            authDomain: "rohmadafi.firebaseapp.com",
            databaseURL: "https://rohmadafi-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rohmadafi",
            storageBucket: "rohmadafi.firebasestorage.app",
            messagingSenderId: "285538177933",
            appId: "1:285538177933:web:e1f732b60209da0e28a3c4"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ALLOWED UIDs - Hanya UID ini yang bisa mengakses (sesuai rules)
        const ALLOWED_UID = '7wrnhaDpsLRmPXPo9nV9ICSpY582';
        
        // Multiple allowed UIDs (jika perlu tambah)
        const ALLOWED_UIDS = [
            '7wrnhaDpsLRmPXPo9nV9ICSpY582'  // UID admin utama
        ];

        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Cek apakah UID user termasuk yang diizinkan
                if (ALLOWED_UIDS.includes(user.uid)) {
                    console.log('User authorized:', user.uid);
                    
                    // Update lastLogin di database
                    if (Firebase.ready) {
                        database.ref('users/' + user.uid + '/lastLogin').set(new Date().toISOString());
                    }
                    
                    window.location.href = 'dashboard.html';
                } else {
                    // Jika UID tidak diizinkan, logout paksa
                    console.log('User not authorized:', user.uid);
                    showError('Akun Anda tidak memiliki izin akses. Hubungi administrator.');
                    auth.signOut();
                }
            }
        });

        // Handle login
        window.handleLogin = function(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            
            loginText.style.display = 'none';
            loginSpinner.style.display = 'inline-block';
            loginBtn.disabled = true;
            
            hideAlerts();
            
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // CEK APAKAH UID DIIZINKAN (sesuai rules)
                    if (!ALLOWED_UIDS.includes(user.uid)) {
                        // Jika tidak diizinkan, logout dan tampilkan error
                        auth.signOut();
                        throw new Error('unauthorized');
                    }
                    
                    // Jika diizinkan, cek data user di database
                    return database.ref('users/' + user.uid).once('value')
                        .then((snapshot) => {
                            const userData = snapshot.val();
                            
                            // Update last login
                            database.ref('users/' + user.uid + '/lastLogin').set(new Date().toISOString());
                            
                            if (userData) {
                                // Simpan data user di session storage
                                sessionStorage.setItem('userRole', userData.role || 'admin');
                                sessionStorage.setItem('userEmail', user.email);
                                sessionStorage.setItem('userUID', user.uid);
                                sessionStorage.setItem('userDisplayName', userData.displayName || 'Admin');
                                
                                showSuccess('Login berhasil! Mengalihkan...');
                                
                                setTimeout(() => {
                                    window.location.href = 'dashboard.html';
                                }, 1500);
                            } else {
                                // Jika data user tidak ada di database, buat baru (sesuai rules)
                                const newUserData = {
                                    email: user.email,
                                    role: 'admin',
                                    displayName: 'Admin Utama',
                                    createdAt: new Date().toISOString(),
                                    lastLogin: new Date().toISOString(),
                                    photoURL: ''
                                };
                                
                                return database.ref('users/' + user.uid).set(newUserData)
                                    .then(() => {
                                        sessionStorage.setItem('userRole', 'admin');
                                        sessionStorage.setItem('userEmail', user.email);
                                        sessionStorage.setItem('userUID', user.uid);
                                        sessionStorage.setItem('userDisplayName', 'Admin Utama');
                                        
                                        showSuccess('Login berhasil! Mengalihkan...');
                                        
                                        setTimeout(() => {
                                            window.location.href = 'dashboard.html';
                                        }, 1500);
                                    });
                            }
                        });
                })
                .catch((error) => {
                    loginText.style.display = 'inline-block';
                    loginSpinner.style.display = 'none';
                    loginBtn.disabled = false;
                    
                    let errorMessage = 'Login gagal. ';
                    
                    if (error.message === 'unauthorized') {
                        errorMessage = 'Akun Anda tidak terdaftar dalam sistem. Akses ditolak.';
                    } else {
                        switch (error.code) {
                            case 'auth/user-not-found':
                                errorMessage += 'Email tidak terdaftar.';
                                break;
                            case 'auth/wrong-password':
                                errorMessage += 'Password salah.';
                                break;
                            case 'auth/invalid-email':
                                errorMessage += 'Format email tidak valid.';
                                break;
                            case 'auth/user-disabled':
                                errorMessage += 'Akun telah dinonaktifkan.';
                                break;
                            case 'auth/too-many-requests':
                                errorMessage += 'Terlalu banyak percobaan. Coba lagi nanti.';
                                break;
                            case 'auth/network-request-failed':
                                errorMessage += 'Koneksi internet bermasalah.';
                                break;
                            default:
                                errorMessage += error.message;
                        }
                    }
                    
                    showError(errorMessage);
                    
                    // Tampilkan info untuk debugging
                    if (error.code === 'auth/user-not-found') {
                        showInfo('Email tidak ditemukan. Gunakan email: cekitet23@gmail.com');
                    } else if (error.code === 'auth/wrong-password') {
                        showInfo('Password salah. Gunakan password: Matahariku23');
                    }
                });
        };

        // Fungsi untuk mengecek akses
        window.checkAccess = function() {
            const email = document.getElementById('email').value;
            if (email === 'cekitet23@gmail.com') {
                showInfo('Email terdaftar. Silakan masukkan password.');
            }
        };

        function hideAlerts() {
            document.getElementById('errorAlert').style.display = 'none';
            document.getElementById('successAlert').style.display = 'none';
            document.getElementById('infoAlert').style.display = 'none';
        }

        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorAlert.style.display = 'block';
            
            setTimeout(() => {
                errorAlert.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successAlert = document.getElementById('successAlert');
            const successMessage = document.getElementById('successMessage');
            successMessage.textContent = message;
            successAlert.style.display = 'block';
            
            setTimeout(() => {
                successAlert.style.display = 'none';
            }, 3000);
        }

        function showInfo(message) {
            const infoAlert = document.getElementById('infoAlert');
            const infoMessage = document.getElementById('infoMessage');
            infoMessage.textContent = message;
            infoAlert.style.display = 'block';
            
            setTimeout(() => {
                infoAlert.style.display = 'none';
            }, 5000);
        }

        // Fungsi untuk registrasi (dihapus karena hanya satu akun)
        // Tidak ada tombol register sesuai rules yang hanya mengizinkan satu UID

        // Auto-fill untuk memudahkan login
        window.addEventListener('load', function() {
            // Bisa diisi otomatis atau tidak sesuai kebutuhan
            console.log('Login page loaded - Restricted access mode');
            console.log('Allowed UID:', ALLOWED_UID);
        });
    </script>
</body>
</html>
